<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Alumno — QR Pass</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        /* ── Layout ─────────────────────────────────────────── */
        .consulta-wrap {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .consulta-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        /* ── Buscador ───────────────────────────────────────── */
        .search-label {
            display: block;
            color: #b71c1c;
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: .5rem;
        }

        .search-input {
            width: 100%;
            padding: .75rem 1rem;
            border: 3px solid var(--color-border);
            border-radius: var(--radius-xl);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color .2s;
            margin-bottom: 1.2rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(92,31,51,.1);
        }

        /* ── Foto ───────────────────────────────────────────── */
        .foto-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 3px solid var(--color-border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 3rem;
        }

        .foto-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Estado credencial — badge debajo de la foto */
        .credencial-badge {
            text-align: center;
            margin-top: .8rem;
            padding: .55rem 1rem;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: .95rem;
            display: none;
        }

        .credencial-badge.activa   { background: #e8f5e9; color: #2e7d32; }
        .credencial-badge.bloqueada{ background: #fce8ed; color: #b71c1c; }

        /* ── Info del alumno ────────────────────────────────── */
        .info-card { display: flex; flex-direction: column; gap: 1rem; }

        .info-row {
            display: flex;
            flex-direction: column;
        }

        .info-row label {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--color-text-muted);
            margin-bottom: .2rem;
        }

        .info-row .info-val {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-text);
            padding: .5rem .8rem;
            background: #f9f9f9;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border-light);
            min-height: 2.2rem;
        }

        .info-row .info-val.empty { color: #bbb; font-style: italic; font-weight: 400; }

        .counters-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .8rem;
        }

        .counter-box {
            text-align: center;
            padding: .8rem .5rem;
            border-radius: var(--radius-md);
            border: 2px solid var(--color-border-light);
        }

        .counter-box .num {
            font-size: 2rem;
            font-weight: 700;
            font-family: monospace;
            color: var(--color-primary);
        }

        .counter-box .lbl {
            font-size: .72rem;
            font-weight: 600;
            color: var(--color-text-muted);
            margin-top: .2rem;
        }

        /* Horario */
        .horario-mini {
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border-light);
        }

        .horario-mini table {
            min-width: 340px;
            font-size: .82rem;
        }

        /* Empty state */
        .empty-msg {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-text-muted);
        }

        .empty-msg .icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }

        /* Responsive */
        @media (max-width: 700px) {
            .consulta-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="header-container">
        <div class="Boton-nav">
            <button type="button" id="menu-toggle-btn" aria-label="Abrir menú">
                <img src="../imgs/menu.png" alt="">
            </button>
        </div>
        <h1 class="title">Consultar Alumno</h1>
        <div class="logo">
            <img src="../imgs/WhatsApp_Image_2025-11-26_at_3.28.04_PM-removebg-preview.png" alt="">
        </div>
    </div>
</header>

<nav class="menu-navegacion" aria-label="Menú principal">
    <ul id="lista-opciones" class="menu-lista">
        <li><a href="/Entrada_Salida.html">Registro de entrada y salida</a></li>
        <li><a href="/BuscarAlumnoVigilante.html">Consultar alumno</a></li>
    </ul>
</nav>
<div id="menu-overlay" class="menu-overlay"></div>

<div class="consulta-wrap">

    <label class="search-label" for="input-boleta">Ingresa la boleta del alumno</label>
    <input type="text" id="input-boleta" class="search-input"
           maxlength="10" placeholder="Ej. 2023630123" autocomplete="off"
           inputmode="numeric">

    <div class="consulta-grid" id="resultado-wrap">

        <!-- Columna izquierda: foto + estado credencial -->
        <div>
            <div class="foto-box" id="foto-box">
                <span id="foto-placeholder">👤</span>
                <img id="foto-alumno" src="" alt="Foto del alumno">
            </div>
            <div class="credencial-badge" id="credencial-badge"></div>
        </div>

        <!-- Columna derecha: info -->
        <div class="card info-card" id="info-card">
            <div class="empty-msg" id="empty-state">
                <span class="icon">🔍</span>
                Ingresa una boleta para ver la información del alumno.
            </div>

            <div id="datos-alumno" style="display:none">
                <div class="info-row">
                    <label>Boleta</label>
                    <div class="info-val" id="v-boleta"></div>
                </div>
                <div class="info-row">
                    <label>Nombre</label>
                    <div class="info-val" id="v-nombre"></div>
                </div>
                <div class="info-row">
                    <label>Grupo</label>
                    <div class="info-val" id="v-grupo"></div>
                </div>
                <div class="info-row">
                    <label>Estado académico</label>
                    <div class="info-val" id="v-estado"></div>
                </div>

                <div class="counters-row">
                    <div class="counter-box">
                        <div class="num" id="v-retardos">0</div>
                        <div class="lbl">Retardos</div>
                    </div>
                    <div class="counter-box">
                        <div class="num" id="v-sincred">0</div>
                        <div class="lbl">Sin credencial</div>
                    </div>
                </div>

                <div class="info-row">
                    <label>Horario del día</label>
                    <div class="horario-mini" id="horario-wrap">
                        <table>
                            <thead>
                                <tr><th>Día</th><th>Hora</th><th>Materia</th></tr>
                            </thead>
                            <tbody id="horario-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- /consulta-grid -->
</div><!-- /consulta-wrap -->

<div class="toast" id="toast"></div>

<footer class="site-footer">
    <div class="footer-container">
        <p>© 2025 Sistema de Control Escolar — CECyT 9</p>
    </div>
</footer>

<script src="./JS/navigation.js"></script>
<script>
// ── Verificar que solo accedan Vigilantes (y Prefectos, por si acaso) ──
// navigation.js ya maneja el redirect si no hay sesión.
// Aquí solo bloqueamos admins que se equivocaron de URL.
(async function() {
    try {
        const r    = await fetch('/api/auth/check', { credentials: 'include' });
        const data = await r.json();
        if (!data.isAuthenticated) { location.href = '/login.html'; return; }
        // Admin tiene BuscarAlumno.html completo — lo redirigimos
        if (data.tipo === 'Administrador') { location.href = '/BuscarAlumno.html'; return; }
    } catch { location.href = '/login.html'; }
})();

// ── Lógica de búsqueda ──────────────────────────────────────
let debounceTimer;

document.getElementById('input-boleta').addEventListener('input', (e) => {
    // Solo números
    e.target.value = e.target.value.replace(/\D/g, '');
    const boleta = e.target.value;

    clearTimeout(debounceTimer);
    if (boleta.length === 10) {
        debounceTimer = setTimeout(() => buscar(boleta), 300);
    } else if (boleta.length < 5) {
        limpiar();
    }
});

async function buscar(boleta) {
    try {
        const res  = await fetch(`/api/alumnos/${boleta}`, { credentials: 'include' });

        if (res.status === 404) { mostrarError('Alumno no encontrado'); return; }
        if (!res.ok)            { mostrarError('Error del servidor'); return; }

        const data = await res.json();
        if (!data.success || !data.alumno) { mostrarError('Alumno no encontrado'); return; }

        mostrarAlumno(data.alumno, data.horario || []);

    } catch { mostrarError('Error de conexión'); }
}

function mostrarAlumno(alumno, horario) {
    // Foto
    const foto = document.getElementById('foto-alumno');
    const ph   = document.getElementById('foto-placeholder');
    if (alumno.url) {
        foto.src           = alumno.url;
        foto.style.display = 'block';
        ph.style.display   = 'none';
        foto.onerror = () => { foto.style.display='none'; ph.style.display=''; };
    } else {
        foto.style.display = 'none';
        ph.style.display   = '';
    }

    // Badge de credencial
    const badge = document.getElementById('credencial-badge');
    badge.style.display = '';
    if (alumno.bloqueado) {
        badge.textContent  = '⛔ Credencial bloqueada';
        badge.className    = 'credencial-badge bloqueada';
    } else {
        badge.textContent  = '✅ Credencial activa';
        badge.className    = 'credencial-badge activa';
    }

    // Datos
    val('v-boleta',   alumno.boleta);
    val('v-nombre',   alumno.nombre);
    val('v-grupo',    alumno.nombre_grupo || '—');
    val('v-estado',   alumno.estado_academico || '—');
    val('v-retardos', alumno.retardos ?? 0);
    val('v-sincred',  alumno.sin_credencial ?? 0);

    // Horario
    const tbody = document.getElementById('horario-tbody');
    if (!horario.length) {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#999;padding:.8rem">Sin horario registrado</td></tr>`;
    } else {
        const orden = ['lunes','martes','miércoles','jueves','viernes'];
        tbody.innerHTML = [...horario]
            .sort((a, b) => orden.indexOf(a.dia) - orden.indexOf(b.dia))
            .map(c => `
            <tr>
                <td style="text-transform:capitalize">${c.dia}</td>
                <td>${(c.inicio||'').slice(0,5)} – ${(c.fin||'').slice(0,5)}</td>
                <td>${esc(c.materia || '—')}</td>
            </tr>`).join('');
    }

    document.getElementById('empty-state').style.display    = 'none';
    document.getElementById('datos-alumno').style.display   = '';
}

function mostrarError(msg) {
    limpiar();
    document.getElementById('empty-state').innerHTML =
        `<span class="icon">⚠️</span>${msg}`;
    document.getElementById('empty-state').style.display = '';
}

function limpiar() {
    const foto = document.getElementById('foto-alumno');
    foto.src           = '';
    foto.style.display = 'none';
    document.getElementById('foto-placeholder').style.display = '';
    document.getElementById('credencial-badge').style.display = 'none';
    document.getElementById('empty-state').innerHTML =
        `<span class="icon">🔍</span>Ingresa una boleta para ver la información del alumno.`;
    document.getElementById('empty-state').style.display  = '';
    document.getElementById('datos-alumno').style.display = 'none';
}

function val(id, v) {
    const el = document.getElementById(id);
    if (el) el.textContent = v;
}

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
