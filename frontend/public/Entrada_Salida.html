<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada / Salida — QR Pass</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/en_sa.css">
</head>
<body>

    <!-- ── HEADER ─────────────────────────────────────── -->
    <header class="site-header">
        <div class="header-container">
            <div class="Boton-nav">
                <button type="button" id="menu-toggle-btn" aria-label="Abrir menú">
                    <img src="../imgs/menu.png" alt="">
                </button>
            </div>
            <h1 class="title">Entrada / Salida — QR Pass</h1>
            <div class="logo">
                <img src="../imgs/WhatsApp_Image_2025-11-26_at_3.28.04_PM-removebg-preview.png" alt="Logo">
            </div>
        </div>
    </header>

    <!-- ── PANEL NAV LATERAL ─────────────────────────── -->
    <nav class="menu-navegacion" aria-label="Menú principal">
        <ul id="lista-opciones" class="menu-lista">
            <li><a href="./Entrada_Salida.html">Registro de entrada y salida</a></li>
            <li><a href="./BuscarAlumno.html">Buscar alumno</a></li>
            <li class="admin-only-link"><a href="./ModificarAlumno.html">Modificar alumno</a></li>
            <li class="admin-only-link"><a href="./GestionUsuarios.html">Gestión de usuarios</a></li>
            <li class="admin-only-link"><a href="./FiltrarAlumnos.html">Filtro de alumnos</a></li>
        </ul>
    </nav>
    <div id="menu-overlay" class="menu-overlay"></div>

    <!-- ── STATUS BAR ────────────────────────────────── -->
    <div class="status-container">
        <div id="status-indicator"></div>
        <h2 id="status-message">Esperando registro...</h2>

        <!-- Columnas: QR box + Foto -->
        <div class="main-container">
            <section>
                <div class="container">
                    <fieldset class="option-group">
                        <legend>Puerta de ingreso</legend>
                        <input type="radio" id="mexico-tacuba" name="puerta" value="mexico-tacuba" checked>
                        <label for="mexico-tacuba">México-Tacuba</label>
                        <input type="radio" id="mar" name="puerta" value="mar">
                        <label for="mar">Mar-Mediterráneo</label>
                    </fieldset>

                    <div class="placeholder-box Registro">
                        <div class="inner-box"></div>
                    </div>
                </div>
            </section>

            <section>
                <div class="container">
                    <div style="text-align:center; margin-bottom:6px;">
                        <span id="tipo-movimiento-display" class="badge-movimiento badge-idle">—</span>
                    </div>

                    <div class="placeholder-box info-box" id="info-box">
                        <img id="student-photo" src="" alt="Foto del alumno" style="display:none;">
                    </div>
                </div>
            </section>
        </div>

        <!-- Campos de salida -->
        <div class="column-outputs">
            <div class="text-entry field">
                <label for="boleta-input">Registro por QR / Boleta</label>
                <input type="text" id="boleta-input" name="qr-input" class="qr-input-url"
                       placeholder="Escanea o escribe la boleta y presiona Enter"
                       autocomplete="off">
            </div>

            <div class="text-entry field">
                <label for="nombre-output">Nombre</label>
                <input type="text" id="nombre-output" readonly>
            </div>

            <div class="text-entry field">
                <label for="boleta-output">Boleta</label>
                <input type="text" id="boleta-output" readonly>
            </div>

            <div class="text-entry field">
                <label for="horario-output">Horario</label>
                <input type="text" id="horario-output" readonly>
            </div>

            <div class="text-entry field">
                <label for="grupo-output">Grupo</label>
                <input type="text" id="grupo-output" readonly>
            </div>

            <div class="container-outputs">
                <div class="text-entry field">
                    <input type="text" id="retardos-output" readonly>
                    <label for="retardos-output">Retardos</label>
                </div>
                <div class="text-entry field">
                    <input type="text" id="sin-credencial-output" readonly>
                    <label for="sin-credencial-output">Sin credencial</label>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-container">
            <p>© 2025 Sistema de Control Escolar — CECyT 9</p>
        </div>
    </footer>

    <script src="./JS/navigation.js"></script>
    <script src="./JS/registro.js" defer></script>
    <script src="./JS/validaciones.js" defer></script>
</body>
</html>
