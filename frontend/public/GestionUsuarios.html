<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios — CECyT 9</title>
    <link rel="stylesheet" href="../css/modificarAlumno.css">
    <style>
        /* ── Layout específico de esta página ── */
        .usuarios-container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 2rem;
        }

        /* ── Tabla de usuarios ── */
        .card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.08);
            padding: 1.5rem;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #3d1422;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn-nuevo {
            background: linear-gradient(135deg,#5c1f33,#3d1422);
            color: white;
            border: none;
            border-radius: 8px;
            padding: .5rem 1rem;
            font-size: .85rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
        }
        .btn-nuevo:hover { opacity: .88; }

        table { width: 100%; border-collapse: collapse; font-size: .85rem; }
        th {
            background: linear-gradient(135deg,#5c1f33,#3d1422);
            color: white; padding: .6rem .8rem; text-align: left;
            font-weight: 600; font-size: .8rem;
        }
        th:first-child { border-radius: 6px 0 0 0; }
        th:last-child  { border-radius: 0 6px 0 0; }
        td { padding: .6rem .8rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tr:hover td { background: #fdf8f9; }

        .badge {
            display: inline-block;
            padding: .2rem .6rem;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 700;
        }
        .badge-admin   { background:#fce8ed; color:#8b1a30; }
        .badge-prefecto{ background:#e8f0fe; color:#1a3a8b; }
        .badge-vigilante{background:#e8f5e9; color:#1a5e20; }
        .badge-activo  { background:#e8f5e9; color:#1a5e20; }
        .badge-inactivo{ background:#fce8ed; color:#8b1a30; }

        .btn-accion {
            border: none; border-radius: 6px; padding: .3rem .65rem;
            font-size: .75rem; font-weight: 600; cursor: pointer;
            transition: opacity .2s; margin-right: 3px;
        }
        .btn-editar   { background:#e8f0fe; color:#1a3a8b; }
        .btn-pass     { background:#fff3e0; color:#7a4000; }
        .btn-toggle   { background:#f3e8ff; color:#4a0080; }
        .btn-accion:hover { opacity: .75; }

        /* ── Panel lateral del formulario ── */
        .panel { position: sticky; top: 1.5rem; }

        .form-section { margin-bottom: 1rem; }
        .form-section label {
            display: block;
            font-size: .8rem; font-weight: 700;
            color: #555; margin-bottom: .3rem;
        }
        .form-section input,
        .form-section select {
            width: 100%; padding: .6rem .9rem;
            border: 2px solid #ddd; border-radius: 8px;
            font-size: .9rem; transition: border-color .2s;
            box-sizing: border-box;
        }
        .form-section input:focus,
        .form-section select:focus {
            outline: none; border-color: #5c1f33;
        }
        .form-section small { color: #888; font-size: .75rem; }

        .form-actions { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: 1.2rem; }
        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg,#5c1f33,#3d1422);
            color: white; border: none; border-radius: 8px;
            padding: .65rem; font-weight: 700; cursor: pointer;
            transition: opacity .2s;
        }
        .btn-primary:hover { opacity: .88; }
        .btn-secondary {
            background: #e0e0e0; color: #333;
            border: none; border-radius: 8px;
            padding: .65rem 1rem; font-weight: 600; cursor: pointer;
        }

        /* ── Modal cambio de contraseña ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 2000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: white; border-radius: 14px;
            padding: 2rem; width: 380px; max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0,0,0,.2);
        }
        .modal h3 { margin: 0 0 1.2rem; color: #3d1422; font-size: 1.1rem; }
        .modal-actions { display: flex; gap: .6rem; margin-top: 1.2rem; }

        /* ── Mensaje de feedback ── */
        .toast {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            padding: .8rem 1.4rem; border-radius: 10px;
            font-weight: 700; font-size: .9rem; color: white;
            z-index: 3000; opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
        }
        .toast.visible { opacity: 1; }
        .toast.ok  { background: #2e7d32; }
        .toast.err { background: #b71c1c; }

        /* ── Separador de sección en formulario ── */
        .divider {
            border: none; border-top: 1px solid #eee;
            margin: 1.2rem 0;
        }
        .panel-subtitle {
            font-size: .75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: .06em;
            color: #999; margin-bottom: .8rem;
        }

        @media (max-width: 900px) {
            .usuarios-container { grid-template-columns: 1fr; }
            .panel { position: static; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <div class="Boton-nav">
                <button type="button" id="menu-toggle-btn">
                    <img src="../imgs/menu.png" alt="Menú">
                </button>
            </div>
            <h1 class="title">Gestión de Usuarios</h1>
            <div class="logo">
                <img src="../imgs/WhatsApp_Image_2025-11-26_at_3.28.04_PM-removebg-preview.png" alt="Logo">
            </div>
        </div>
    </header>

    <nav class="menu-navegacion">
        <ul id="lista-opciones" class="menu-lista">
            <li><a href="./Entrada_Salida.html">Registro de entrada y salida</a></li>
            <li><a href="./BuscarAlumno.html">Buscar alumno</a></li>
            <li class="admin-only-link">
                <a href="./ModificarAlumno.html">Modificar alumno</a>
            </li>
            <li class="admin-only-link">
                <a href="./GestionUsuarios.html">Gestión de usuarios</a>
            </li>
        </ul>
    </nav>
    <div id="menu-overlay" class="menu-overlay"></div>

    <!-- ══ CONTENIDO PRINCIPAL ══════════════════════════════ -->
    <div class="usuarios-container">

        <!-- Tabla de usuarios -->
        <div class="card">
            <div class="card-title">
                <span>Usuarios del sistema</span>
                <button class="btn-nuevo" id="btn-nuevo-usuario">+ Nuevo usuario</button>
            </div>
            <div style="overflow-x:auto;">
                <table id="tabla-usuarios">
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-usuarios">
                        <tr><td colspan="6" style="text-align:center;padding:2rem;color:#999">
                            Cargando…
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Panel formulario -->
        <div class="panel">
            <div class="card">
                <div class="card-title" id="panel-titulo">Nuevo usuario</div>

                <form id="form-usuario" autocomplete="off">
                    <input type="hidden" id="f-id">

                    <div class="form-section">
                        <label for="f-nombre">Nombre completo *</label>
                        <input type="text" id="f-nombre" maxlength="150"
                               placeholder="Apellidos Nombre" required>
                    </div>

                    <div class="form-section">
                        <label for="f-usuario">Nombre de usuario *</label>
                        <input type="text" id="f-usuario" maxlength="50"
                               placeholder="sin espacios" required autocomplete="off">
                    </div>

                    <div class="form-section">
                        <label for="f-email">Correo electrónico
                            <small>(para recuperación)</small>
                        </label>
                        <input type="email" id="f-email" maxlength="200"
                               placeholder="usuario@ejemplo.com">
                    </div>

                    <div class="form-section">
                        <label for="f-rol">Rol *</label>
                        <select id="f-rol" required>
                            <option value="">Cargando roles…</option>
                        </select>
                    </div>

                    <!-- Contraseña solo visible al crear -->
                    <div id="seccion-password" class="form-section">
                        <label for="f-password">Contraseña *
                            <small>(mínimo 6 caracteres)</small>
                        </label>
                        <input type="password" id="f-password" maxlength="100"
                               autocomplete="new-password">
                    </div>

                    <!-- Activo solo visible al editar -->
                    <div id="seccion-activo" class="form-section" style="display:none;">
                        <label for="f-activo">Estado</label>
                        <select id="f-activo">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="btn-guardar-usuario">
                            Crear usuario
                        </button>
                        <button type="button" class="btn-secondary" id="btn-cancelar-usuario">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ══ MODAL CAMBIO DE CONTRASEÑA ═══════════════════════ -->
    <div class="modal-overlay" id="modal-password">
        <div class="modal">
            <h3 id="modal-titulo">Cambiar contraseña</h3>

            <div id="seccion-pass-actual" class="form-section">
                <label for="m-actual">Contraseña actual *</label>
                <input type="password" id="m-actual" maxlength="100"
                       autocomplete="current-password">
            </div>

            <div class="form-section">
                <label for="m-nueva">Nueva contraseña *
                    <small>(mínimo 6 caracteres)</small>
                </label>
                <input type="password" id="m-nueva" maxlength="100"
                       autocomplete="new-password">
            </div>

            <div class="form-section">
                <label for="m-confirmar">Confirmar nueva contraseña *</label>
                <input type="password" id="m-confirmar" maxlength="100"
                       autocomplete="new-password">
            </div>

            <div class="modal-actions">
                <button class="btn-primary" id="btn-confirmar-pass">Guardar contraseña</button>
                <button class="btn-secondary" id="btn-cerrar-modal">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- ══ TOAST ════════════════════════════════════════════ -->
    <div class="toast" id="toast"></div>

    <footer class="site-footer">
        <div class="footer-container">
            <p>© 2025 Sistema de Control Escolar — CECyT 9</p>
        </div>
    </footer>

    <script src="./JS/navigation.js"></script>
    <script src="./JS/gestionUsuarios.js"></script>
</body>
</html>
