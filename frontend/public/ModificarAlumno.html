<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar/Modificar Alumno — CECyT 9</title>
    <link rel="stylesheet" href="../css/modificarAlumno.css">
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <div class="Boton-nav">
                <button type="button" id="menu-toggle-btn">
                    <img src="../imgs/menu.png" alt="Menú">
                </button>
            </div>
            <h1 class="title">Registrar/Modificar alumno</h1>
            <div class="logo">
                <img src="../imgs/WhatsApp_Image_2025-11-26_at_3.28.04_PM-removebg-preview.png" alt="Logo">
            </div>
        </div>
    </header>

    <nav class="menu-navegacion">
        <ul id="lista-opciones" class="menu-lista">
            <li><a href="./Entrada_Salida.html">Registro de entrada y salida</a></li>
            <li><a href="./BuscarAlumno.html">Buscar alumno</a></li>
            <li class="admin-only-link"><a href="./ModificarAlumno.html">Modificar alumno</a></li>
        </ul>
    </nav>
    <div id="menu-overlay" class="menu-overlay"></div>

    <div class="main-wrapper">
        <h2 class="page-subtitle">Registrar Nuevo Alumno</h2>

        <div class="top-search-bar">
            <div class="search-group">
                <label for="search-boleta" class="text-red">Ingresar boleta</label>
                <div class="search-input-wrapper">
                    <input type="text" id="search-boleta" maxlength="10" autocomplete="off">
                    <button type="button" id="btn-buscar" class="btn-dark">Buscar alumno</button>
                </div>
            </div>
        </div>

        <div class="form-card">
            <span class="card-label">Datos del alumno</span>
            
            <form id="student-form" autocomplete="off">
                <div class="form-grid">
                    
                    <div class="left-col">
                        <div class="field custom-file-upload">
                            <label>Foto de Alumno</label>
                            <div class="file-input-wrapper">
                                <button type="button" class="btn-file" onclick="document.getElementById('form-foto').click()">Selecciona un archivo</button>
                                <span class="file-name" id="file-name-display">Sin archivos seleccionados</span>
                                <input type="file" id="form-foto" accept="image/jpeg,image/png,image/gif" style="display: none;">
                            </div>
                            <small class="helper-text">Formatos: JPG, PNG, GIF. MAX: 5MB</small>
                        </div>

                        <div class="field">
                            <label for="form-boleta">Boleta</label>
                            <input type="text" id="form-boleta" maxlength="10" required>
                        </div>

                        <div class="field">
                            <label for="form-nombre">Nombre de Alumno</label>
                            <input type="text" id="form-nombre" maxlength="200" required class="input-solo-letras">
                        </div>

                        <div class="field">
                            <label for="form-grupo">Grupo</label>
                            <input type="text" id="form-grupo" required> 
                        </div>

                        <div class="field">
                            <label for="form-estatus">Estatus</label>
                            <select id="form-estatus" required>
                                <option value="Activo">Activo</option>
                                <option value="Baja">Baja</option>
                            </select>
                        </div>

                        <div class="checkbox-field">
                            <input type="checkbox" id="form-puertas-abiertas">
                            <label for="form-puertas-abiertas" class="bold-label">Permitir puertas abiertas</label>
                        </div>
                    </div>

                    <div class="right-col">
                        
                        <div class="photo-preview-box">
                            <span id="no-photo-message">No hay foto seleccionada</span>
                            <img id="preview-image" src="" alt="Vista previa" style="display:none;">
                        </div>

                        <div class="horario-section">
                            <label class="bold-label">Horario escolar</label>
                            <div class="horario-box">
                                
                                <div class="fila-horario-mock">
                                    <input type="text" value="Lun" readonly class="input-dia-mock">
                                    <input type="text" value="7:00 a. m." readonly class="input-hora-mock">
                                    <div class="hora-row">
                                        <input type="text" value="8:30 a. m." readonly class="input-hora-mock">
                                        <span class="dots">...</span>
                                    </div>
                                    <div class="materia-row">
                                        <select class="select-materia-mock"><option>Seleccionar Materia...</option></select>
                                        <span class="icon-close">⊗</span>
                                    </div>
                                </div>

                                <button type="button" id="btn-agregar-clase" class="btn-add-materia">+ Agregar Materia</button>
                            </div>
                        </div>

                    </div>
                </div> <div class="form-actions">
                    <button type="submit" id="btn-guardar" class="btn-dark">Registrar alumno</button>
                    <button type="button" id="btn-cancelar" class="btn-outline">Limpiar campos</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-container"><p>© 2026 Sistema de Control Escolar — CECyT 9</p></div>
    </footer>

    <script src="./JS/navigation.js"></script>
    </body>
</html>
